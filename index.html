<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Pro | Gestão Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <div class="logo">VORTEX<span>PRO</span></div>
            <div class="user-info">
                <input type="text" id="userNameInput" placeholder="Seu nome aqui..." oninput="atualizarNome()">
                <div class="avatar" id="userInitial">U</div>
            </div>
        </header>

        <main class="main-content">
            <section class="welcome">
                <h1>Olá, <span id="displayNome">Usuário</span>!</h1>
                <p id="currentDate"></p>
            </section>

            <div class="dashboard-grid">
                
                <div class="card">
                    <h3>💰 Gerador de Orçamento</h3>
                    <div class="form-group">
                        <label>Serviço</label>
                        <select id="tipoServico" onchange="calcular()">
                            <option value="0">Selecione...</option>
                            <option value="150">Site Institucional (R$ 150)</option>
                            <option value="50">Edição de Foto (R$ 50)</option>
                            <option value="80">Landing Page (R$ 80)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantidade</label>
                        <input type="number" id="qtd" value="1" min="1" oninput="calcular()">
                    </div>
                    <div class="total-area">
                        Total: <strong id="totalValor">R$ 0,00</strong>
                    </div>
                    <button class="btn-action" onclick="gerarResumo()">Salvar Orçamento</button>
                </div>

                <div class="card">
                    <h3>✅ Minhas Tarefas</h3>
                    <div class="add-task">
                        <input type="text" id="taskInput" placeholder="Nova tarefa...">
                        <button onclick="addTarefa()">+</button>
                    </div>
                    <ul id="taskList" class="task-list">
                        </ul>
                </div>

                <div class="card ad-card">
                    <span>ANÚNCIO MONETIZADO</span>
                    <p>Espaço reservado para Google AdSense</p>
                </div>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
