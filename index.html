<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio com Localização</title>
    <style>
        /* Estilo inspirado no Flip Clock / Dark Mode */
        body {
            background-color: #111;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .date-display {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .clock-container {
            display: flex;
            gap: 10px;
            font-size: 5rem;
            font-weight: bold;
        }

        .digit {
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .location-display {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #4a90e2;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="date" class="date-display">Carregando data...</div>
    
    <div class="clock-container">
        <div id="hour" class="digit">00</div>
        <div id="minute" class="digit">00</div>
        <div id="second" class="digit">00</div>
    </div>

    <div id="location" class="location-display">Buscando sua cidade...</div>

    <script>
        // Função para atualizar Relógio e Data
        function updateTime() {
            const now = new Date();
            
            // Relógio
            document.getElementById('hour').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('minute').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('second').textContent = String(now.getSeconds()).padStart(2, '0');

            // Data
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }

        // Função para pegar a Localização
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        // API gratuita para transformar coordenadas em nome de cidade
                        const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`);
                        const data = await response.json();
                        document.getElementById('location').textContent = `${data.city}, ${data.principalSubdivision}`;
                    } catch (err) {
                        document.getElementById('location').textContent = "Localização indisponível";
                    }
                }, () => {
                    document.getElementById('location').textContent = "Acesso à localização negado";
                });
            } else {
                document.getElementById('location').textContent = "Geolocalização não suportada";
            }
        }

        // Inicialização
        setInterval(updateTime, 1000);
        updateTime();
        getLocation();
    </script>
</body>
</html>
