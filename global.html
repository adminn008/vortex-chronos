    <h1 style="font-size: 50px;">Em Breve</h1>
    <p>Estamos preparando novidades.</p>

<!-- O CODIGO ABAIXO ESTA "DESATIVADO" (COMENTADO) -->
<div style="display: none;">


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Global Vortex | Mundo</title>
    <link rel="stylesheet" href="style-tools.css">
</head>
<body>
    <div class="tool-container">
        <h1>GLOBAL VORTEX</h1>
        <div class="world-grid" id="world-grid"></div>
    </div>
    <script>
    const cities = [
        { name: 'São Paulo', tz: 'America/Sao_Paulo' },
        { name: 'Nova Iorque', tz: 'America/New_York' },
        { name: 'Londres', tz: 'Europe/London' },
        { name: 'Paris', tz: 'Europe/Paris' },
        { name: 'Dubai', tz: 'Asia/Dubai' },
        { name: 'Tóquio', tz: 'Asia/Tokyo' },
        { name: 'Lisboa', tz: 'Europe/Lisbon' },
        { name: 'Roma', tz: 'Europe/Rome' },
        { name: 'Sydney', tz: 'Australia/Sydney' },
        { name: 'Berlim', tz: 'Europe/Berlin' },
        { name: 'Moscovo', tz: 'Europe/Moscow' },
        { name: 'Cidade do México', tz: 'America/Mexico_City' }
    ];

    function updateWorld() {
        const grid = document.getElementById('world-grid');
        grid.innerHTML = cities.map(c => {
            // Pega a hora exata baseada no fuso horário (Timezone)
            const time = new Date().toLocaleTimeString('pt-BR', { 
                timeZone: c.tz,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            return `
                <div class="city-card">
                    <h2>${c.name}</h2>
                    <p>${time}</p>
                </div>`;
        }).join('');
    }

    setInterval(updateWorld, 1000);
    updateWorld();
</script>

</body>
</html>
