<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deep Focus | Pomodoro & Imersão</title>
    <link rel="stylesheet" href="style-tools.css">
    <style>
        .pomodoro-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }

        .timer-display {
            font-size: 4rem;
            font-family: monospace;
            color: #00ff41;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .audio-placeholder {
            border: 1px dashed #333;
            padding: 20px;
            margin-top: 30px;
            color: #555;
            font-size: 0.8rem;
            border-radius: 10px;
        }

        .wake-lock-status {
            font-size: 0.7rem;
            margin-top: 15px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }

        .status-active .status-dot {
            background: #00ff41;
            box-shadow: 0 0 5px #00ff41;
        }

        .btn-main {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            border-radius: 5px;
        }

        .btn-main:hover { background: rgba(0, 255, 65, 0.1); }
    </style>
</head>
<body>
    <div class="tool-container">
        <a href="index.html" style="color:#555; text-decoration:none; font-size:0.8rem;">← VOLTAR</a>
        <h1>DEEP FOCUS</h1>
        
        <div class="pomodoro-container">
            <div id="timer-label" style="letter-spacing: 2px; color: #888;">FOCO</div>
            <div class="timer-display" id="timer">25:00</div>
            
            <div class="controls">
                <button class="btn-main" onclick="toggleTimer()" id="startBtn">INICIAR</button>
                <button class="btn-main" style="border-color:#555; color:#555;" onclick="resetTimer()">REINICIAR</button>
            </div>

            <div id="wake-status-cont" class="wake-lock-status">
                <div class="status-dot"></div>
                <span id="wake-text">Tela: Normal</span>
                <button onclick="requestWakeLock()" id="wakeBtn" style="background:none; border:1px solid #333; color:#888; font-size:10px; margin-left:10px; cursor:pointer;">ATIVAR TELA LIGADA</button>
            </div>
        </div>

        <div class="audio-placeholder">
            <p><strong>🎧 Laboratório de Som</strong></p>
            <p>Estamos calibrando os sons imersivos para latência zero. Disponível em breve!</p>
        </div>
    </div>

    <script>
        // Lógica do Pomodoro
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                document.getElementById('startBtn').innerText = "RETOMAR";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Tempo de foco encerrado! Hora de uma pausa.");
                        resetTimer();
                    }
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSAR";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = 25 * 60;
            updateDisplay();
            document.getElementById('startBtn').innerText = "INICIAR";
        }

        // Lógica para Manter a Tela Ligada (Wake Lock API)
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wake-status-cont').classList.add('status-active');
                    document.getElementById('wake-text').innerText = "Tela: Sempre Ativa";
                    document.getElementById('wakeBtn').style.display = "none";
                    
                    wakeLock.addEventListener('release', () => {
                        document.getElementById('wake-status-cont').classList.remove('status-active');
                        document.getElementById('wake-text').innerText = "Tela: Normal";
                    });
                } else {
                    alert("Seu navegador não suporta a função de manter a tela ligada.");
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
    </script>
</body>
</html>
